      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f35;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="15" fill="url(#bg)" />

  <!-- Your database icon (embedded as image) -->
